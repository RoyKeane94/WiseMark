<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — WiseMark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #2d3a52;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 44px;
      max-width: 400px;
      width: 100%;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 36px;
    }
    .logo-mark {
      width: 24px;
      height: 24px;
      background: #334155;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
    }
    .logo-name { font-size: 1.05rem; font-weight: 500; color: #1a1f2e; }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      font-weight: 400;
      color: #1a1f2e;
      margin-bottom: 8px;
    }
    p { font-size: 14px; color: #8a96ae; line-height: 1.6; margin-bottom: 24px; }
    a.btn {
      display: block;
      text-align: center;
      padding: 13px;
      background: #2d3a52;
      color: #fff;
      text-decoration: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 24px;
    }
    a.btn:hover { opacity: 0.9; }
    .links { text-align: center; font-size: 13px; color: #8a96ae; }
    .links a { color: #2d3a52; font-weight: 500; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">W</div>
      <span class="logo-name">WiseMark</span>
    </div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn">Go to home</a>
    <p class="links">
      <a href="/login">Sign in</a> · <a href="/register">Register</a>
    </p>
  </div>
</body>
</html>
