<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}WiseMark{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="/static/frontend/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --slate-950: #0f172a;
    --slate-900: #1e293b;
    --slate-700: #334155;
    --slate-600: #475569;
    --slate-500: #64748b;
    --slate-400: #94a3b8;
    --slate-300: #cbd5e1;
    --slate-200: #e2e8f0;
    --slate-100: #f1f5f9;
    --slate-50: #f8fafc;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--slate-900);
    background: var(--white);
    -webkit-font-smoothing: antialiased;
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1rem 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--slate-200);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 0.5rem;
    font-weight: 600; font-size: 1.05rem; color: var(--slate-900);
    text-decoration: none;
  }
  .nav-logo-icon {
    width: 26px; height: 26px; border-radius: 5px;
    background: var(--slate-700);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 0.7rem; font-weight: 600;
  }
  .nav-links { display: flex; align-items: center; gap: 2rem; }
  .nav-link {
    font-size: 0.85rem; color: var(--slate-500);
    text-decoration: none; transition: color 0.2s;
  }
  .nav-link:hover { color: var(--slate-900); }
  .nav-cta-wrap { display: flex; align-items: center; gap: 0.75rem; }
  .nav-login {
    padding: 0.45rem 1.1rem;
    background: transparent; color: var(--slate-700);
    border: 1px solid var(--slate-300);
    border-radius: 6px;
    font-size: 0.85rem; font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-login:hover { color: var(--slate-900); border-color: var(--slate-400); background: var(--slate-50); }
  .nav-cta {
    padding: 0.45rem 1.1rem;
    background: var(--slate-900); color: white;
    border: none; border-radius: 6px;
    font-size: 0.85rem; font-weight: 500;
    text-decoration: none;
    transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--slate-700); }
  .page-main { padding: 6rem 2.5rem 4rem; max-width: 760px; margin: 0 auto; }
  .page-main h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.75rem, 3vw, 2.25rem);
    font-weight: 400;
    color: var(--slate-950);
    margin-bottom: 1.5rem;
  }
  .page-main p {
    font-size: 1rem; line-height: 1.7;
    color: var(--slate-600);
    margin-bottom: 1rem;
  }
  .page-main .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--slate-400);
    margin-bottom: 0.75rem;
  }
  footer {
    padding: 2.5rem 2.5rem;
    border-top: 1px solid var(--slate-200);
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1060px;
    margin: 0 auto;
  }
  footer p { font-size: 0.75rem; color: var(--slate-400); }
  footer .footer-links { display: flex; gap: 1.5rem; }
  footer .footer-links a {
    font-size: 0.75rem; color: var(--slate-400);
    text-decoration: none; transition: color 0.2s;
  }
  footer .footer-links a:hover { color: var(--slate-600); }
  @media (max-width: 860px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
  }
  {% block extra_css %}{% endblock %}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">W</div>
    WiseMark
  </a>
  <div class="nav-links">
    <a href="/#how" class="nav-link">How it works</a>
    <a href="/#why" class="nav-link">Why it matters</a>
    <a href="/#data-security" class="nav-link">Data security</a>
  </div>
  <div class="nav-cta-wrap">
    <a href="/login" class="nav-login">Login</a>
    <a href="/register" class="nav-cta">Register</a>
  </div>
</nav>
<main class="page-main">
  {% block content %}{% endblock %}
</main>
<footer>
  <p>&copy; 2026 WiseMark</p>
  <div class="footer-links">
    <a href="/privacy/">Privacy</a>
    <a href="/security/">Security</a>
    <a href="/contact/">Contact</a>
  </div>
</footer>
</body>
</html>
